; PlatformIO Project Configuration File
;
; Aquarium Controller - Adafruit ESP32 Feather V2 + 3.5" TFT FeatherWing
;
; Upload workflow:
;   1. First flash: plug in USB-C, run "Upload" (uses serial by default below).
;   2. After device boots and connects to WiFi, switch to OTA by uncommenting
;      the [env:ota] section below, or by running:
;        pio run -e ota -t upload
;   3. mDNS hostname is set in wifi_ota.cpp (default: aquarium.local)

[platformio]
default_envs = serial

[env]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino
monitor_speed = 115200

lib_deps =
  adafruit/Adafruit GFX Library
  adafruit/Adafruit HX8357 Library
  adafruit/Adafruit TSC2007
  paulstoffregen/OneWire
  milesburton/DallasTemperature

build_flags =
  -DCORE_DEBUG_LEVEL=3

; ---------- USB / serial upload (use for first flash) ----------
[env:serial]
upload_protocol = esptool
upload_speed = 115200

; ---------- OTA upload (use after first flash) ----------
; To upload over WiFi:  pio run -e ota -t upload
; Or set default_envs = ota above.
[env:ota]
upload_protocol = espota
upload_port = aquarium.local
; If mDNS is flaky, hardcode the IP instead:
; upload_port = 192.168.1.XXX
upload_flags =
  --port=3232
